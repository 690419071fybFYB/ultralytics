# DIOR dataset (object detection)
# Set `path` to your DIOR dataset root (YOLO format) before training.
# Example usage: yolo train model=rtdetr-l.pt data=DIOR.yaml
#
# Expected folder structure:
# DIOR/
# ├── images/
# │   ├── train/
# │   ├── val/
# │   └── test/  (optional)
# └── labels/
#     ├── train/
#     ├── val/
#     └── test/  (optional)

path: DIOR
train: images/train
val: images/val
test: images/test

names:
  0: airplane
  1: airport
  2: baseballfield
  3: basketballcourt
  4: bridge
  5: chimney
  6: dam
  7: expressway-service-area
  8: expressway-toll-station
  9: golffield
  10: groundtrackfield
  11: harbor
  12: overpass
  13: ship
  14: stadium
  15: storagetank
  16: tenniscourt
  17: trainstation
  18: vehicle
  19: windmill
